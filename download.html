<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popular Websites & Downloads</title>
    <style>
        :root {
            --bg-color: #f4f7fb;
            --text-color: #1f2937;
            --card-bg: linear-gradient(145deg, #ffffff, #f1f5f9);
            --card-border: #e5e7eb;
            --shadow-sm: rgba(0, 0, 0, 0.08);
            --shadow-md: rgba(0, 0, 0, 0.1);
            --shadow-lg: rgba(0, 0, 0, 0.14);
            
            /* Custom color for the APK card */
            --android-green: #3ddc84;
        }

        body {
            font-family: Arial, sans-serif;
            background: var(--bg-color);
            margin: 0;
            padding: 40px 20px;
        }

        h1 {
            text-align: center;
            color: var(--text-color);
            margin-bottom: 12px;
            font-size: 2.2rem;
        }

        /* Home Button Container & Styling */
        .nav-container {
            text-align: center;
            margin-bottom: 32px;
        }

        .home-btn {
            display: inline-block;
            background-color: #0f172a;
            color: #ffffff;
            padding: 12px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15);
        }

        .home-btn:hover {
            background-color: #1e293b;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .site {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px 12px;
            text-align: center;
            box-shadow: 0 6px 16px var(--shadow-md);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), 
                        box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--card-border);
        }

        .site:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 24px var(--shadow-lg);
        }

        /* Unique styling highlight for the APK download card */
        .site.download-card {
            border: 1px solid rgba(61, 220, 132, 0.4);
            background: linear-gradient(145deg, #ffffff, #f0fdf4);
        }

        .site img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            margin-bottom: 12px;
            padding: 10px;
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 4px 10px var(--shadow-sm);
        }

        .site a {
            text-decoration: none;
            color: #111827;
            font-weight: 700;
            font-size: 0.95rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>
