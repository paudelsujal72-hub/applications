
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f4ff;
  --surface:#ffffff;
  --surface2:#f8faff;
  --border:#e2e8f0;
  --text:#1e293b;
  --text2:#64748b;
  --text3:#94a3b8;
  --accent:#6366f1;
  --accent2:#8b5cf6;
  --green-bg:#f0fdf4;
  --green-border:#bbf7d0;
  --green-text:#15803d;
  --green-badge:#dcfce7;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:0 4px 12px rgba(0,0,0,0.08);
  --shadow-hover:0 12px 28px rgba(99,102,241,0.18);
  --radius:14px;--radius-sm:10px;--radius-pill:999px
}

body{font-family:'Inter',sans-serif;background:var(--bg);min-height:100vh;padding:0 0 60px}

/* ── HERO ── */
.hero{
  position:relative;overflow:hidden;
  background:linear-gradient(135deg,#1e1b4b 0%,#312e81 40%,#4c1d95 100%);
  padding:52px 24px 64px;text-align:center;
  margin-bottom:0
}
.hero-dots{
  position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(255,255,255,0.08) 1px,transparent 1px);
  background-size:28px 28px;
  pointer-events:none;
}
.hero-glow{
  position:absolute;top:-80px;left:50%;transform:translateX(-50%);
  width:500px;height:300px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(139,92,246,0.4) 0%,transparent 70%);
  pointer-events:none
}
.hero-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);
  color:rgba(255,255,255,0.85);font-size:12px;font-weight:500;
  padding:5px 14px;border-radius:var(--radius-pill);
  margin-bottom:18px;backdrop-filter:blur(4px)
}
.hero h1{
  font-size:2.2rem;font-weight:700;color:#fff;
  letter-spacing:-0.03em;line-height:1.15;margin-bottom:10px
}
.hero h1 span{
  background:linear-gradient(90deg,#a78bfa,#38bdf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.hero-sub{color:rgba(255,255,255,0.6);font-size:15px;margin-bottom:28px;max-width:380px;margin-left:auto;margin-right:auto}

/* Stats row */
.hero-stats{
  display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:32px
}
.stat-chip{
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.85);font-size:12px;font-weight:500;
  padding:6px 14px;border-radius:var(--radius-pill)
}
.stat-chip strong{color:#fff;font-weight:700}

/* Home button */
.home-btn{
  display:inline-flex;align-items:center;gap:7px;
  background:#fff;color:#312e81;
  padding:11px 26px;border-radius:var(--radius-pill);
  text-decoration:none;font-size:14px;font-weight:600;
  box-shadow:0 4px 20px rgba(0,0,0,0.2);
  transition:transform 0.15s,box-shadow 0.15s
}
.home-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,0.25)}

/* Wave divider */
.wave{display:block;width:100%;height:48px;background:var(--bg);clip-path:ellipse(55% 100% at 50% 100%)}

/* ── SEARCH + TABS ── */
.controls{padding:0 20px;max-width:860px;margin:0 auto}
.search-wrap{position:relative;margin-bottom:16px}
.search-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}
#search{
  width:100%;padding:13px 16px 13px 44px;
  border:1.5px solid var(--border);border-radius:var(--radius-pill);
  background:var(--surface);color:var(--text);font-family:inherit;font-size:14px;
  box-shadow:var(--shadow-md);outline:none;transition:border-color 0.15s,box-shadow 0.15s
}
#search:focus{border-color:#a5b4fc;box-shadow:0 0 0 3px rgba(99,102,241,0.12)}
#search::placeholder{color:var(--text3)}
.tabs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
.tab{
  padding:7px 18px;border-radius:var(--radius-pill);
  border:1.5px solid var(--border);background:var(--surface);
  color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;
  font-family:inherit;transition:all 0.15s;box-shadow:var(--shadow-sm)
}
.tab:hover{border-color:#c7d2fe;color:var(--accent)}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 14px rgba(99,102,241,0.35)}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:14px;max-width:860px;margin:0 auto;padding:0 20px}
.card{
  background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);
  padding:20px 10px 16px;text-align:center;text-decoration:none;color:var(--text);
  display:flex;flex-direction:column;align-items:center;gap:10px;
  box-shadow:var(--shadow-sm);
  transition:transform 0.2s cubic-bezier(.34,1.56,.64,1),box-shadow 0.2s,border-color 0.2s;
  position:relative;overflow:hidden
}
.card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(99,102,241,0.05),transparent);opacity:0;transition:opacity 0.2s}
.card:hover{transform:translateY(-5px) scale(1.02);box-shadow:var(--shadow-hover);border-color:#c7d2fe}
.card:hover::after{opacity:1}
.card.dl{background:var(--green-bg);border-color:var(--green-border)}
.card.dl:hover{box-shadow:0 12px 28px rgba(34,197,94,0.18);border-color:#86efac}
.card.dl .card-name{color:var(--green-text)}
.icon-ring{width:52px;height:52px;border-radius:14px;background:var(--surface2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;transition:transform 0.2s}
.card:hover .icon-ring{transform:scale(1.1)}
.icon-ring img{width:30px;height:30px;object-fit:contain}
.card-name{font-size:12px;font-weight:500;color:var(--text);line-height:1.3}
.badge{font-size:10px;font-weight:600;padding:2px 10px;border-radius:var(--radius-pill);background:var(--green-badge);color:var(--green-text);display:inline-flex;align-items:center;gap:3px}
.stats-row{text-align:center;font-size:12px;color:var(--text3);padding:20px 0 0}
.stats-row strong{color:var(--text2)}
.empty{grid-column:1/-1;text-align:center;padding:48px;color:var(--text3);font-size:14px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeUp 0.25s ease both}
</style>

<h2 class="sr-only">Popular websites and APK downloads directory</h2>

<div class="hero">
  <div class="hero-dots"></div>
  <div class="hero-glow"></div>
  <div class="hero-badge"><i class="ti ti-world" style="font-size:13px" aria-hidden="true"></i> Quick Access Hub</div>
  <h1>Popular Websites<br>&amp; <span>Downloads</span></h1>
  <p class="hero-sub">Your one-stop shortcut to favourite sites, social apps, and APK downloads</p>
  <div class="hero-stats">
    <div class="stat-chip"><strong>3</strong> APK Downloads</div>
    <div class="stat-chip"><strong>12</strong> Websites</div>
    <div class="stat-chip"><strong>4</strong> Categories</div>
  </div>
  <a href="https://www.sujal10.com.np" class="home-btn" aria-label="Back to Home">
    <i class="ti ti-arrow-left" style="font-size:15px" aria-hidden="true"></i> Back to Home
  </a>
</div>
<div class="wave"></div>

<div style="padding:24px 0 20px">
  <div class="controls">
    <div class="search-wrap">
      <i class="ti ti-search" aria-hidden="true"></i>
      <input type="text" id="search" placeholder="Search sites and apps…" oninput="render()">
    </div>
    <div class="tabs">
      <button class="tab active" onclick="setTab('all',this)">All</button>
      <button class="tab" onclick="setTab('download',this)"><i class="ti ti-download" style="font-size:12px;margin-right:3px" aria-hidden="true"></i>Downloads</button>
      <button class="tab" onclick="setTab('social',this)"><i class="ti ti-users" style="font-size:12px;margin-right:3px" aria-hidden="true"></i>Social</button>
      <button class="tab" onclick="setTab('video',this)"><i class="ti ti-player-play" style="font-size:12px;margin-right:3px" aria-hidden="true"></i>Video</button>
    </div>
  </div>
</div>

<div class="grid" id="grid"></div>
<div class="stats-row" id="sr"></div>

<script>
const data=[
  {name:"Face2Face",href:"base.apk",img:"F2f.jpg",cat:"download",dl:true},
  {name:"Anilab",href:"anilab.apk",img:"anilab.jpg",cat:"download",dl:true},
  {name:"Vidmate",href:"vidmate.apk",img:"Vidmate.jpg",cat:"download",dl:true},
  {name:"Facebook",href:"https://www.facebook.com/",cat:"social",domain:"facebook.com"},
  {name:"Instagram",href:"https://www.instagram.com/",cat:"social",domain:"instagram.com"},
  {name:"Twitter / X",href:"https://www.twitter.com/",cat:"social",domain:"twitter.com"},
  {name:"LinkedIn",href:"https://www.linkedin.com/",cat:"social",domain:"linkedin.com"},
  {name:"YouTube",href:"https://www.youtube.com/",cat:"video",domain:"youtube.com"},
  {name:"Netflix",href:"https://www.netflix.com/",cat:"video",domain:"netflix.com"},
  {name:"Reddit",href:"https://www.reddit.com/",cat:"social",domain:"reddit.com"},
  {name:"Pinterest",href:"https://www.pinterest.com/",cat:"social",domain:"pinterest.com"},
  {name:"TikTok",href:"https://www.tiktok.com/",cat:"video",domain:"tiktok.com"},
  {name:"Snapchat",href:"https://www.snapchat.com/",cat:"social",domain:"snapchat.com"},
  {name:"Twitch",href:"https://www.twitch.tv/",cat:"video",domain:"twitch.tv"},
  {name:"Discord",href:"https://www.discord.com/",cat:"social",domain:"discord.com"},
];
let tab="all";
function setTab(t,el){tab=t;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));el.classList.add('active');render()}
function render(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const f=data.filter(s=>(!q||s.name.toLowerCase().includes(q))&&(tab==='all'||s.cat===tab));
  const grid=document.getElementById('grid');
  if(!f.length){grid.innerHTML=`<div class="empty"><i class="ti ti-mood-empty" style="font-size:32px;display:block;margin-bottom:8px;opacity:.4" aria-hidden="true"></i>No results for "<strong>${q}</strong>"</div>`;document.getElementById('sr').innerHTML='';return}
  grid.innerHTML=f.map((s,i)=>{
    const icon=s.domain?`<img src="https://www.google.com/s2/favicons?domain=${s.domain}&sz=64" alt="${s.name}">`:`<img src="${s.img}" alt="${s.name}">`;
    const badge=s.dl?`<span class="badge"><i class="ti ti-download" style="font-size:9px" aria-hidden="true"></i>APK</span>`:'';
    const attrs=s.dl?`download="${s.href}"`:`target="_blank" rel="noopener"`;
    return`<a href="${s.href}" ${attrs} class="card${s.dl?' dl':''}" style="animation-delay:${i*0.03}s"><div class="icon-ring">${icon}</div><span class="card-name">${s.name}</span>${badge}</a>`;
  }).join('');
  document.getElementById('sr').innerHTML=`Showing <strong>${f.length}</strong> of <strong>${data.length}</strong> sites`;
}
render();
</script>
