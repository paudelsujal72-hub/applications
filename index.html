<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sujal Paudel</title>
    <!-- Friendly and modern Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
            background-color: #f8fafc;
        }

        /* Full Screen Container Split */
        .wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: 100vw;
        }

        @media (min-width: 768px) {
            .wrapper {
                flex-direction: row;
            }
        }

        /* Left Side: Dynamic Full Image Section */
        .image-section {
            position: relative;
            flex: 1;
            background-color: #e2e8f0;
            min-height: 40vh;
        }

        @media (min-width: 768px) {
            .image-section {
                height: 100vh;
                position: sticky;
                top: 0;
            }
        }

        .profile-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Waving emoji on top of the image */
        .wave-badge {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 2.5rem;
            background: #ffffff;
            padding: 10px;
            border-radius: 50%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            animation: wave-animation 2.5s infinite;
            transform-origin: 70% 70%;
        }

        /* Right Side: Content Area */
        .content-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: linear-gradient(135deg, #fff5f5 0%, #f0f4ff 100%);
            position: relative;
        }

        @media (min-width: 768px) {
            .content-section {
                padding: 80px;
                height: 100vh;
            }
        }

        .inner-content {
            max-width: 500px;
            width: 100%;
            z-index: 2;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #4f46e5;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .intro-text {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #475569;
            margin-bottom: 40px;
        }

        /* Casual Grid Box for Contact Info */
        .contact-box {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
        }

        .contact-row {
            display: flex;
            margin-bottom: 16px;
            font-size: 1rem;
        }

        .contact-row:last-child {
            margin-bottom: 0;
        }

        .contact-label {
            font-weight: 700;
            color: #64748b;
            width: 100px;
            flex-shrink: 0;
        }

        .contact-value a, .contact-value span {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .contact-value span {
            color: #334155;
        }

        .contact-value a:hover {
            color: #1d4ed8;
            text-decoration: underline;
        }

        /* Fun, Friendly Call to Action Button */
        .cta-btn {
            display: inline-block;
            background-color: #0f172a;
            color: #ffffff;
            padding: 16px 32px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.15);
        }

        .cta-btn:hover {
            background-color: #1e293b;
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(15, 23, 42, 0.2);
        }

        /* Waving Hand Keyframes */
        @keyframes wave-animation {
            0% { transform: rotate( 0.0deg) }
           10% { transform: rotate(14.0deg) }
           20% { transform: rotate(-8.0deg) }
           30% { transform: rotate(14.0deg) }
           40% { transform: rotate(-4.0deg) }
           50% { transform: rotate(10.0deg) }
           60% { transform: rotate( 0.0deg) }
          100% { transform: rotate( 0.0deg) }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        
        <!-- Left Side: Massive, beautiful photo section -->
        <div class="image-section">
            <img src="profile.jpg" alt="Sujal Paudel" class="profile-photo">
            <div class="wave-badge">👋</div>
        </div>

        <!-- Right Side: Friendly Full-Screen Presentation -->
        <div class="content-section">
            <div class="inner-content">
                
                <h1>Sujal Paudel</h1>
                <p class="subtitle">LEARNER</p>

                <p class="intro-text">
                    Hi i am sujal. 
                    welcome to my page 
                    you will find nothing here 
                    this website is only made for fun and learning purpose.
                </p>

                <!-- Information Dashboard -->
                <div class="contact-box">
                    <div class="contact-row">
                        <span class="contact-label">Email</span>
                        <span class="contact-value"><a href="mailto:mail@gmail.com">mail@gmail.com</a></span>
                    </div>
                    <div class="contact-row">
                        <span class="contact-label">Call me</span>
                        <span class="contact-value"><a href="tel:9800000000">9800000000</a></span>
                    </div>
                    <div class="contact-row">
                        <span class="contact-label">Based in</span>
                        <span class="contact-value"><span>Kathmandu, Nepal</span></span>
                    </div>
                </div>

                <!-- Connect CTA changed to Download -->
                <a href="download.html" class="cta-btn">Download</a>

            </div>
        </div>

    </div>

</body>
</html>
